ai_usage_summary: |
  Used Claude (Claude Code) as a pair programmer for data exploration,
  architecture discussion, implementation, and profiling/optimization of the
  ranking pipeline. All design decisions (evidence-over-skill-list principle,
  honeypot consistency checks, multiplicative availability model, weights)
  were iterated and validated against the dataset locally. No candidate data
  was sent to any hosted LLM during ranking; the ranking step makes no network
  calls of any kind.

methodology_summary: |
  Evidence-first hybrid ranker. A streaming pass over the 100K pool applies
  (1) a title prescreen implementing the JD's explicit non-engineering rule,
  (2) honeypot gates built on internal-consistency checks (job duration vs
  its own dates, claimed YoE vs dated career span, expert skills with zero
  use), (3) concept-lexicon evidence extraction over career-history prose —
  never the self-reported skill list — covering retrieval, ranking,
  evaluation, LLM, NLP/IR, production, LTR, open-source, and HR-tech domain,
  weighted by recency and product-company context, (4) structural fit (YoE
  trapezoid for the 5-9y band, penalties mirroring every JD disqualifier:
  research-only, services-only, CV/speech-primary, shallow-LLM recency,
  title-chasing, non-coding titles, uncorroborated skill stuffing), and
  (5) a multiplicative availability model from behavioral signals
  (last-active, recruiter response rate, interview completion, notice,
  location/visa). TF-IDF cosine to the JD refines the top-1500 shortlist at a
  15% blend. Reasonings are generated from each candidate's extracted
  evidence terms and real concerns. Full run: ~95s, CPU-only, no network.

declarations:
